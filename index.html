<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My CI/CD HTML Site</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      color: #1f2937;
    }

    p {
      color: #4b5563;
      font-size: 18px;
    }

    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 18px;
      background: #2563eb;
      color: white;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, CI/CD!</h1>
    <p>This HTML website is deployed automatically using GitHub Actions.</p>
    <div class="badge">Deployment Successful</div>
  </div>
</body>
</html>
